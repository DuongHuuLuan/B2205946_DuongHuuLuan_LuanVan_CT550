<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="70" x2="1510" y2="930" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F6F1E6"/>
      <stop offset="1" stop-color="#E8F0F6"/>
    </linearGradient>
    <linearGradient id="appHeader" x1="320" y1="130" x2="1180" y2="130" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E766E"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="stickerGrad" x1="420" y1="830" x2="1140" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF0D6"/>
      <stop offset="1" stop-color="#FFE1B5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#17324D" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #142436; }
      .subtitle { font: 400 17px 'Segoe UI', Arial, sans-serif; fill: #526171; }
      .header { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #FFFFFF; }
      .section { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #142436; }
      .boxTitle { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #142436; }
      .boxText { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #3D566F; }
      .small { font: 500 14px 'Segoe UI', Arial, sans-serif; fill: #4F6276; }
      .chip { font: 700 14px 'Segoe UI', Arial, sans-serif; fill: #17324D; }
      .arrow { stroke: #496781; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .soft { stroke: #6F8AA0; stroke-width: 2.4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dash { stroke-dasharray: 8 8; }
    </style>
    <marker id="arrowEnd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#496781"/>
    </marker>
    <marker id="arrowEndSoft" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6F8AA0"/>
    </marker>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="1420" cy="150" r="130" fill="#FFFFFF" fill-opacity="0.32"/>
  <circle cx="130" cy="860" r="92" fill="#FFFFFF" fill-opacity="0.28"/>

  <text x="80" y="78" class="title">Kiến trúc ứng dụng người dùng</text>
  <text x="80" y="110" class="subtitle">Sơ đồ tổng quan để trình bày trong báo cáo luận văn</text>

  <rect x="70" y="285" rx="26" ry="26" width="220" height="128" fill="#FFF9EF" stroke="#E5C889" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="108" y="334" class="boxTitle">Người dùng</text>
  <text x="108" y="364" class="boxText">Tương tác qua giao diện:</text>
  <text x="108" y="388" class="boxText">đăng nhập, xem sản phẩm,</text>
  <text x="108" y="412" class="boxText">đặt hàng, chat, thiết kế sticker</text>

  <rect x="320" y="130" rx="34" ry="34" width="870" height="770" fill="#FFFFFF" stroke="#CAD8E3" stroke-width="2" filter="url(#shadow)"/>
  <rect x="320" y="130" rx="34" ry="34" width="870" height="88" fill="url(#appHeader)"/>
  <text x="365" y="185" class="header">Flutter User App</text>

  <rect x="370" y="248" rx="24" ry="24" width="770" height="116" fill="#F4FBFA" stroke="#9ED7D0" stroke-width="2"/>
  <text x="408" y="292" class="boxTitle">1. Presentation layer</text>
  <text x="408" y="320" class="boxText">Pages, widgets, giao diện người dùng và điều hướng bằng GoRouter</text>
  <rect x="408" y="333" rx="14" ry="14" width="110" height="32" fill="#DDF4EF"/>
  <text x="442" y="354" class="chip">Pages</text>
  <rect x="530" y="333" rx="14" ry="14" width="118" height="32" fill="#DDF4EF"/>
  <text x="562" y="354" class="chip">Widgets</text>
  <rect x="660" y="333" rx="14" ry="14" width="122" height="32" fill="#DDF4EF"/>
  <text x="688" y="354" class="chip">GoRouter</text>
  <rect x="794" y="333" rx="14" ry="14" width="106" height="32" fill="#DDF4EF"/>
  <text x="827" y="354" class="chip">Theme</text>

  <rect x="370" y="394" rx="24" ry="24" width="770" height="116" fill="#F5F8FF" stroke="#AFC4FF" stroke-width="2"/>
  <text x="408" y="438" class="boxTitle">2. State management / xử lý nghiệp vụ</text>
  <text x="408" y="466" class="boxText">Provider và ChangeNotifier ViewModel quản lý trạng thái của từng chức năng</text>
  <rect x="408" y="479" rx="14" ry="14" width="118" height="32" fill="#E2E9FF"/>
  <text x="440" y="500" class="chip">Provider</text>
  <rect x="538" y="479" rx="14" ry="14" width="144" height="32" fill="#E2E9FF"/>
  <text x="569" y="500" class="chip">ViewModel</text>
  <rect x="694" y="479" rx="14" ry="14" width="182" height="32" fill="#E2E9FF"/>
  <text x="721" y="500" class="chip">Business logic</text>

  <rect x="370" y="540" rx="24" ry="24" width="770" height="116" fill="#FFF7F0" stroke="#F3C89A" stroke-width="2"/>
  <text x="408" y="584" class="boxTitle">3. Data layer</text>
  <text x="408" y="612" class="boxText">Repository, domain model và mapper cho sản phẩm, đơn hàng, chat, sticker</text>
  <rect x="408" y="625" rx="14" ry="14" width="132" height="32" fill="#FBE5CC"/>
  <text x="440" y="646" class="chip">Repository</text>
  <rect x="552" y="625" rx="14" ry="14" width="146" height="32" fill="#FBE5CC"/>
  <text x="587" y="646" class="chip">Domain model</text>
  <rect x="710" y="625" rx="14" ry="14" width="108" height="32" fill="#FBE5CC"/>
  <text x="742" y="646" class="chip">Mapper</text>

  <rect x="370" y="686" rx="24" ry="24" width="770" height="136" fill="#F7F6FF" stroke="#C9C0F8" stroke-width="2"/>
  <text x="408" y="730" class="boxTitle">4. Core integration</text>
  <text x="408" y="758" class="boxText">Feature API gọi qua DioClient, kèm AuthInterceptor và ErrorHandler</text>
  <rect x="408" y="771" rx="14" ry="14" width="116" height="32" fill="#E7E2FF"/>
  <text x="442" y="792" class="chip">API classes</text>
  <rect x="536" y="771" rx="14" ry="14" width="120" height="32" fill="#E7E2FF"/>
  <text x="567" y="792" class="chip">DioClient</text>
  <rect x="668" y="771" rx="14" ry="14" width="150" height="32" fill="#E7E2FF"/>
  <text x="695" y="792" class="chip">AuthInterceptor</text>
  <rect x="830" y="771" rx="14" ry="14" width="134" height="32" fill="#E7E2FF"/>
  <text x="860" y="792" class="chip">ErrorHandler</text>

  <text x="370" y="856" class="section">Các nhóm chức năng chính</text>
  <rect x="420" y="830" rx="20" ry="20" width="660" height="56" fill="url(#stickerGrad)" stroke="#E0A857" stroke-width="2.5"/>
  <text x="446" y="864" class="boxTitle">Điểm nhấn dự án: Thiết kế sticker cá nhân hóa cho nón bảo hiểm</text>

  <rect x="420" y="892" rx="14" ry="14" width="88" height="34" fill="#E8F3FF"/>
  <text x="447" y="915" class="chip">Auth</text>
  <rect x="520" y="892" rx="14" ry="14" width="128" height="34" fill="#E8F3FF"/>
  <text x="546" y="915" class="chip">Sản phẩm</text>
  <rect x="660" y="892" rx="14" ry="14" width="116" height="34" fill="#E8F3FF"/>
  <text x="684" y="915" class="chip">Danh mục</text>
  <rect x="788" y="892" rx="14" ry="14" width="146" height="34" fill="#E8F3FF"/>
  <text x="816" y="915" class="chip">Giỏ hàng - Đơn</text>
  <rect x="946" y="892" rx="14" ry="14" width="96" height="34" fill="#E8F3FF"/>
  <text x="971" y="915" class="chip">Hồ sơ</text>
  <rect x="1054" y="892" rx="14" ry="14" width="78" height="34" fill="#E8F3FF"/>
  <text x="1079" y="915" class="chip">Chat</text>

  <rect x="70" y="472" rx="24" ry="24" width="220" height="120" fill="#F4FAFF" stroke="#A9CDEB" stroke-width="2"/>
  <text x="104" y="518" class="boxTitle">SecureStorage</text>
  <text x="104" y="549" class="small">Lưu JWT token</text>
  <text x="104" y="572" class="small">Lưu last route</text>
  <text x="104" y="595" class="small">Lưu push token</text>

  <rect x="70" y="646" rx="24" ry="24" width="220" height="148" fill="#F4FBFA" stroke="#9ED7D0" stroke-width="2"/>
  <text x="104" y="692" class="boxTitle">App services</text>
  <text x="104" y="723" class="small">PushNotificationService</text>
  <text x="104" y="746" class="small">Deep link / AppLinks</text>
  <text x="104" y="769" class="small">Khôi phục điều hướng</text>

  <rect x="1240" y="188" rx="26" ry="26" width="290" height="182" fill="#FFF8F2" stroke="#F2C189" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1278" y="235" class="boxTitle">Backend system</text>
  <text x="1278" y="267" class="boxText">REST API cho xác thực, sản phẩm,</text>
  <text x="1278" y="291" class="boxText">giỏ hàng, đơn hàng, hồ sơ, chat</text>
  <text x="1278" y="315" class="boxText">và lưu thiết kế sticker</text>
  <text x="1278" y="344" class="small">Luồng xử lý chính của ứng dụng</text>

  <rect x="1240" y="410" rx="26" ry="26" width="290" height="112" fill="#F5F8FF" stroke="#AFC4FF" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1278" y="456" class="boxTitle">Realtime chat</text>
  <text x="1278" y="486" class="boxText">WebSocket cho tin nhắn và badge</text>

  <rect x="1240" y="564" rx="26" ry="26" width="290" height="112" fill="#F7F6FF" stroke="#C9C0F8" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1278" y="610" class="boxTitle">Firebase Cloud Messaging</text>
  <text x="1278" y="640" class="boxText">Push notification đến thiết bị</text>

  <rect x="1240" y="718" rx="26" ry="26" width="290" height="130" fill="#F4FBFA" stroke="#9ED7D0" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1278" y="764" class="boxTitle">Dịch vụ ngoài</text>
  <text x="1278" y="796" class="boxText">Thanh toán VNPay, vận chuyển GHN</text>
  <text x="1278" y="820" class="boxText">và xử lý tài nguyên sticker</text>

  <path d="M290 348H350" class="arrow" marker-end="url(#arrowEnd)"/>
  <path d="M755 364V390" class="arrow" marker-end="url(#arrowEnd)"/>
  <path d="M755 510V536" class="arrow" marker-end="url(#arrowEnd)"/>
  <path d="M755 656V682" class="arrow" marker-end="url(#arrowEnd)"/>
  <path d="M1140 754H1200C1220 754 1220 282 1240 282" class="arrow" marker-end="url(#arrowEnd)"/>

  <path d="M290 532H344C360 532 360 452 370 452" class="soft" marker-end="url(#arrowEndSoft)"/>
  <path d="M370 736H340C316 736 316 532 290 532" class="soft" marker-end="url(#arrowEndSoft)"/>
  <path d="M290 720H338C360 720 360 304 370 304" class="soft" marker-end="url(#arrowEndSoft)"/>
  <path d="M290 720H338C360 720 360 452 370 452" class="soft dash" marker-end="url(#arrowEndSoft)"/>
  <path d="M290 720H338C360 720 360 610 370 610" class="soft" marker-end="url(#arrowEndSoft)"/>

  <path d="M1140 452H1214C1226 452 1226 466 1240 466" class="soft" marker-end="url(#arrowEndSoft)"/>
  <path d="M930 452H1122C1162 452 1162 620 1240 620" class="soft dash" marker-end="url(#arrowEndSoft)"/>
  <path d="M930 756H1120C1162 756 1162 783 1240 783" class="soft" marker-end="url(#arrowEndSoft)"/>
  <path d="M750 822V842" class="soft" marker-end="url(#arrowEndSoft)"/>

  <text x="80" y="944" class="subtitle">Gợi ý thuyết minh: nhấn mạnh kiến trúc 4 lớp và chức năng nổi bật là thiết kế sticker cá nhân hóa.</text>
</svg>
